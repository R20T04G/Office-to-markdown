services:
  backend:
    build:
      context: ./backend
    ports:
      - "5152:8080" 
    environment:
      - ASPNETCORE_ENVIRONMENT=Development

  frontend:
    build:
      context: ./frontend
    ports:
      - "3001:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    depends_on:
      - backend